# Codecov configuration for copybook-rs
# Prevents codecov/patch status checks from blocking PRs due to narrow
# threshold misses (e.g., 77.27% vs 77.53% target).
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

ignore:
  - "tools/**"
  - "tests/**"
  - "fuzz/**"
  - "examples/**"
