[package]
name = "copybook-lexer"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "COBOL copybook lexical analysis and tokenization primitives."
documentation = "https://docs.rs/copybook-lexer"
readme = "README.md"
include = ["src/**", "Cargo.toml", "README.md", "LICENSE"]
keywords = ["cobol", "copybook", "lexer", "parser", "tokenizer"]
categories = ["parsing", "text-processing"]

[package.metadata.docs.rs]
all-features = false
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
logos.workspace = true

[dev-dependencies]
proptest.workspace = true

[features]
# No-op: allows ci-mutants.yml to pass --features comprehensive-tests uniformly
comprehensive-tests = []

[lints]
workspace = true
