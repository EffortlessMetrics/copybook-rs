[package]
name = "copybook-cli-determinism"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage = "https://github.com/EffortlessMetrics/copybook-rs"
description = "Determinism command execution and output rendering for the copybook CLI."
documentation = "https://docs.rs/copybook-cli-determinism"
readme = "README.md"
include = ["src/**", "tests/**", "Cargo.toml", "README.md", "LICENSE"]
keywords = ["cobol", "copybook", "determinism", "cli"]
categories = ["encoding", "command-line-utilities"]

[package.metadata.docs.rs]
all-features = false
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
anyhow.workspace = true
clap.workspace = true
serde_json.workspace = true
copybook-determinism = { workspace = true }
copybook-core = { workspace = true }
copybook-codec = { workspace = true }

[dev-dependencies]
proptest.workspace = true
tempfile.workspace = true

[lints]
workspace = true
